name: CI

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - ".planning/**"
      - ".*"
      - ".*/**"
      - "!.github/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python with uv
        uses: yourdevops/pathfinder-ci-steps-library/setup/python-uv@34739ae15ad4c9f8fec2ada0de9594c80be38c4b
        id: setup-python-with-uv
      - name: Lint with Ruff
        uses: yourdevops/pathfinder-ci-steps-library/lint/ruff@cddb081f9b164ffbe7f553b6aba7d410dd6bee6d
        id: lint-with-ruff

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

          # On version tag: sync both chart version and appVersion to the tag
          # On main push: keep chart version from Chart.yaml, set appVersion to SHA
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            helm package chart/ --version "${VERSION}" --app-version "${VERSION}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            helm package chart/ --app-version "sha-${SHORT_SHA}"
          fi

          helm push pathfinder-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
