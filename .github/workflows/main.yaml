name: python-uv CI workflow
"on":
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - ".planning/**"
      - ".*"
      - ".*/**"
      - "!.github/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python with uv
        uses: yourdevops/pathfinder-ci-steps-library/setup/python-uv@34739ae15ad4c9f8fec2ada0de9594c80be38c4b
        id: setup-python-with-uv
      - name: Lint with Ruff
        uses: yourdevops/pathfinder-ci-steps-library/lint/ruff@cddb081f9b164ffbe7f553b6aba7d410dd6bee6d
        id: lint-with-ruff
      # Custom steps here
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Copy .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          # Create consolidated .env file to the project root
          printf "%s" "$ENV_FILE" > .env

      - name: Deploy to server
        env:
          REMOTE_HOST: ${{ vars.SRV_01_IP }}
          REMOTE_USER: ${{ vars.SRV_01_USER }}
          REMOTE_PATH: /home/${{ vars.SRV_01_USER }}/${{ github.event.repository.name }}/
        run: |
          rsync -avz --delete \
            --exclude '.git*' \
            ./ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH

          ssh $REMOTE_USER@$REMOTE_HOST "
          DOCKER_GID=\$(stat -c '%g' /var/run/docker.sock 2>/dev/null || echo 0) && \
          cd $REMOTE_PATH && \
          echo \"DOCKER_GID=\$DOCKER_GID\" >> .env && \
          docker compose up --build -d --remove-orphans"
