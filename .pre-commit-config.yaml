exclude: '^(theme/static/js/vendor/|\.planning/)'

repos:
  - repo: https://github.com/adamchainz/django-upgrade
    rev: "1.29.1"
    hooks:
      - id: django-upgrade

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^chart/templates/'
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Architecture
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        types: [python]

  # SAST
  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.3"
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']

  - repo: https://github.com/semgrep/semgrep
    rev: v1.152.0
    hooks:
      - id: semgrep
        args: ['--config', 'p/python', '--config', 'p/django', '--error']
        exclude: '^tests/'

  # - repo: https://github.com/bridgecrewio/checkov
  #   rev: 3.2.506
  #   hooks:
  #     - id: checkov
  #       files: (Dockerfile|docker-compose\.ya?ml)$
  #       types: [file]
  #       args: ['--framework', 'dockerfile']
  #     - id: checkov
  #       name: checkov-helm
  #       files: ^chart/
  #       types: [file]
  #       args:
  #         - '--framework'
  #         - 'helm'
  #         - '--skip-check'
  #         - 'CKV_K8S_21'   # false positive: .Release.Namespace resolves to 'default' only during static rendering
  #         - '--skip-check'
  #         - 'CKV_K8S_35'   # secrets as env vars is standard for Django/12-factor apps

  # Type checking
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
