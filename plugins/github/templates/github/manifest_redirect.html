{% extends "base.html" %}

{% block title %}Redirecting to GitHub{% endblock %}

{% block content %}
<div class="p-8">
    <div class="max-w-md mx-auto text-center">
        <div class="card">
            <div class="flex justify-center mb-4">
                <svg class="animate-spin h-8 w-8 text-dark-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold mb-2">Redirecting to GitHub...</h1>
            <p class="text-dark-muted mb-4">
                You'll be taken to GitHub to create the app for <strong class="text-dark-text">{{ organization }}</strong>.
            </p>
            <p class="text-sm text-dark-muted">
                If you're not redirected automatically,
                <a href="#" id="manifest-submit-link"
                   class="text-dark-accent hover:text-dark-accent-hover underline">
                    click here
                </a>.
            </p>
        </div>
    </div>

    <!-- Hidden form that auto-submits to GitHub (external target, no Django CSRF needed) -->
    <!-- nosemgrep: python.django.security.django-no-csrf-token.django-no-csrf-token -->
    <form id="manifest-form" method="post" action="{{ manifest_url }}">
        <input type="hidden" name="manifest" value="{{ manifest_json }}">
    </form>
</div>

<script nonce="{{ csp_nonce }}">
    // Fallback manual submit link
    document.getElementById('manifest-submit-link').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('manifest-form').submit();
    });
    // Auto-submit the form after a brief delay to show the loading message
    setTimeout(function() {
        document.getElementById('manifest-form').submit();
    }, 500);
</script>
{% endblock %}
