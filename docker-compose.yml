# Self-Service Portal - Docker Compose
# Compatible with both Docker Compose and Podman Compose

services:
  portal:
    labels:
      - traefik.enable=true
      - traefik.http.routers.pathfinder.rule=Host(`pathfinder.yourdevops.me`)
      - traefik.http.services.pathfinder.loadbalancer.server.port=8000
      - traefik.http.routers.pathfinder.tls=true
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathfinder-portal
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      - PTF_ENCRYPTION_KEY=${PTF_ENCRYPTION_KEY}
    volumes:
      - data:/app/data
      # Mount Docker socket for container management (optional)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Required for Docker socket access - set DOCKER_GID to your host's docker group ID
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped
    networks:
      - yourdevops_public
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathfinder-worker
    command: uv run python manage.py db_worker --queue-name "*"
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - PTF_ENCRYPTION_KEY=${PTF_ENCRYPTION_KEY}
    volumes:
      - data:/app/data
    restart: unless-stopped
    depends_on:
      portal:
        condition: service_healthy
    networks:
      - yourdevops_public

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathfinder-scheduler
    command: uv run python manage.py run_task_scheduler
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - PTF_ENCRYPTION_KEY=${PTF_ENCRYPTION_KEY}
    volumes:
      - data:/app/data
    restart: unless-stopped
    depends_on:
      portal:
        condition: service_healthy
    networks:
      - yourdevops_public

volumes:
  data:

networks:
  yourdevops_public:
    external: true
