<div class="flex items-center gap-1.5">
    <span class="text-xs text-dark-muted">Compare to</span>
    <select class="px-2 py-1 text-xs bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:border-dark-accent font-mono"
            hx-get="{% url 'ci_workflows:version_manifest' workflow_name=workflow.name version_id=version.id %}"
            hx-target="#version-content-{{ version.id }}"
            hx-swap="innerHTML"
            hx-trigger="change"
            name="compare">
        {% if not compare_version %}
        <option value="" disabled selected>select version</option>
        {% endif %}
        {% for candidate in compare_candidates %}
        <option value="{{ candidate.id }}" {% if compare_version and candidate.id == compare_version.id %}selected{% endif %}>
            {% if candidate.version %}v{{ candidate.version }}{% else %}Draft{% endif %}
        </option>
        {% endfor %}
    </select>
</div>
