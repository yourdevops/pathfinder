{% load humanize %}

{% if not ci_workflow %}
<!-- No CI Workflow assigned -->
<div class="bg-dark-surface border-2 border-dashed border-dark-border rounded-lg p-8 text-center">
    <svg class="w-12 h-12 mx-auto text-dark-muted mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
    </svg>
    <h3 class="text-lg font-semibold text-dark-text mb-1">Set Up CI Pipeline</h3>
    <p class="text-dark-muted text-sm mb-4">Assign a CI Workflow to start building this service.</p>
    <a href="{% url 'projects:service_detail' project_name=project.name service_name=service.name %}?tab=ci"
       hx-get="{% url 'projects:service_detail' project_name=project.name service_name=service.name %}?tab=ci"
       hx-target="#tab-content"
       hx-push-url="true"
       class="inline-flex items-center gap-2 px-4 py-2 bg-dark-accent hover:bg-dark-accent/80 text-white rounded-lg text-sm transition-colors">
        Assign CI Workflow
    </a>
</div>
{% else %}
<!-- CI Workflow assigned but no builds -->
<div class="bg-dark-surface border-2 border-dashed border-dark-border rounded-lg p-8 text-center">
    <svg class="w-12 h-12 mx-auto text-dark-muted mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
    </svg>
    <h3 class="text-lg font-semibold text-dark-text mb-1">No Builds Yet</h3>
    <p class="text-dark-muted text-sm mb-4">Your CI workflow is set up. Builds will appear when your pipeline runs.</p>
    {% if can_edit %}
    <form method="post" action="{% url 'projects:service_fetch_builds' project.name service.name %}" class="inline">
        {% csrf_token %}
        <button type="submit" class="inline-flex items-center gap-2 px-4 py-2 bg-dark-accent hover:bg-dark-accent/80 text-white rounded-lg text-sm transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Fetch Builds
        </button>
    </form>
    {% endif %}
</div>
{% endif %}
