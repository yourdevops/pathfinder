{% extends "core/services/wizard/base.html" %}

{% block extra_head %}
<script nonce="{{ csp_nonce }}">
document.addEventListener('alpine:init', function() {
    Alpine.data('envVarWizard', function() {
        return {
            vars: [],
            ptfVars: [],
            showDesc: {},
            lastAddedIdx: -1,

            initFromField: function(fieldId, ptfData) {
                this.ptfVars = ptfData;
                var el = document.getElementById(fieldId);
                if (el && el.value && el.value !== '[]') {
                    try { this.vars = JSON.parse(el.value); } catch(e) { this.vars = []; }
                }
            },

            addVar: function() {
                this.vars.push({ key: '', value: '', lock: false, description: '' });
                this.syncField();
                var self = this;
                self.lastAddedIdx = self.vars.length - 1;
                setTimeout(function() { self.lastAddedIdx = -1; }, 1500);
            },

            removeVar: function(idx) {
                this.vars.splice(idx, 1);
                this.syncField();
            },

            updateKey: function(idx, val) {
                this.vars[idx].key = val.toUpperCase().replace(/[^A-Z0-9_]/g, '_');
                this.syncField();
            },

            updateValue: function(idx, val) {
                this.vars[idx].value = val;
                this.syncField();
            },

            updateDesc: function(idx, val) {
                this.vars[idx].description = val;
                this.syncField();
            },

            toggleLock: function(idx) {
                this.vars[idx].lock = !this.vars[idx].lock;
                this.syncField();
            },

            toggleDesc: function(key) {
                this.showDesc[key] = !this.showDesc[key];
            },

            syncField: function() {
                var el = document.getElementById('id_configuration-env_vars_json');
                if (el) { el.value = JSON.stringify(this.vars); }
            }
        };
    });
});
</script>
{% endblock %}

{% block wizard_content %}
<div x-data="envVarWizard"
     x-init="initFromField('id_configuration-env_vars_json', {{ ptf_vars_json|default:'[]' }})">

    <!-- Info banner -->
    <div class="mb-4 p-3 rounded-lg bg-blue-900/20 border border-blue-500/30 text-sm text-blue-300">
        Variables with empty values can be filled later on each environment's settings page before deployment.
    </div>

    <!-- System PTF_* vars (read-only) -->
    <div class="mb-2 space-y-1">
        <template x-for="(pvar, i) in ptfVars" :key="i">
            <div class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-dark-surface/30">
                <span class="flex-shrink-0 text-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </span>
                <code class="font-mono text-dark-text text-sm" x-text="pvar.key"></code>
                <span class="text-dark-muted">=</span>
                <span class="text-dark-muted font-mono text-sm" x-text="pvar.value"></span>
            </div>
        </template>
    </div>

    <!-- PTF_ENVIRONMENT note -->
    <p class="text-xs text-dark-muted mb-4">{{ ptf_env_note }}</p>

    <!-- Separator -->
    <div class="border-t border-dark-border my-4"></div>

    <!-- Editable service vars -->
    <div class="space-y-1">
        <template x-for="(v, idx) in vars" :key="idx">
            <div>
                <div class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-dark-surface/50 transition-all duration-500"
                     :class="idx === lastAddedIdx ? 'ring-1 ring-green-500/50' : ''">
                    <!-- Lock toggle -->
                    <button type="button" @click="toggleLock(idx)"
                            :class="v.lock ? 'text-red-400' : 'text-gray-700/30 hover:text-gray-500'"
                            class="flex-shrink-0 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  x-bind:d="v.lock ? 'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z' : 'M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z'" />
                        </svg>
                    </button>
                    <!-- Key input -->
                    <input type="text" :value="v.key" @input="updateKey(idx, $event.target.value)"
                           class="bg-transparent border-0 font-mono text-dark-text text-sm w-40 focus:ring-0 p-0"
                           placeholder="KEY_NAME">
                    <span class="text-dark-muted">=</span>
                    <!-- Value input -->
                    <input type="text" :value="v.value" @input="updateValue(idx, $event.target.value)"
                           class="bg-transparent border-0 font-mono text-dark-muted text-sm flex-1 focus:ring-0 p-0"
                           placeholder="value">
                    <!-- Description toggle -->
                    <button type="button" @click="toggleDesc(v.key || idx)"
                            class="flex-shrink-0 text-dark-muted hover:text-dark-accent transition-colors" title="Edit description">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </button>
                    <!-- Remove button -->
                    <button type="button" @click="removeVar(idx)"
                            class="flex-shrink-0 text-dark-muted hover:text-red-400 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <!-- Description row (collapsible) -->
                <div x-show="showDesc[v.key || idx]"
                     class="px-4 py-2 bg-dark-surface/30 rounded-b-lg -mt-1 ml-7">
                    <input type="text" :value="v.description" @input="updateDesc(idx, $event.target.value)"
                           class="bg-transparent border-0 text-dark-muted text-xs w-full focus:ring-0 p-0"
                           placeholder="Description (optional)">
                </div>
            </div>
        </template>
    </div>

    <!-- Add variable button -->
    <button type="button" @click="addVar()" class="mt-3 flex items-center gap-2 text-sm text-dark-accent hover:text-dark-text transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add variable
    </button>

    <!-- Hidden JSON field for form submission -->
    {{ wizard.form.env_vars_json }}
</div>
{% endblock %}
