{% extends "base.html" %}

{% block sidebar %}
{% include "core/components/nav_service.html" %}
{% endblock %}

{% block content %}
<div class="p-8" hx-ext="ws" ws-connect="/ws/services/{{ service.id }}/">

      <div class="flex items-center gap-2 px-4 py-2 bg-amber-500/10 border border-amber-500/30 rounded-lg text-sm text-amber-300">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
        Live updates temporarily unavailable. Reconnecting...
      </div>
    </div>
    <div id="tab-content">
        {% include tab_template %}
    </div>
</div>
{% endblock %}
