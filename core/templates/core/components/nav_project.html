<!-- Project-scoped Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-full w-64 bg-dark-surface border-r border-dark-border flex flex-col">
    <!-- Back to Projects (replaces DevSSP logo position) -->
    <div class="p-4 border-b border-dark-border">
        <a href="{% url 'projects:list' %}" class="flex items-center text-dark-text hover:text-dark-accent transition-colors group">
            <svg class="w-5 h-5 mr-2 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="text-xl font-bold">Back to Projects</span>
        </a>
    </div>

    <!-- Project Header -->
    <div class="p-4 border-b border-dark-border">
        <h2 class="text-lg font-bold text-dark-text truncate" title="{{ current_project.name }}">
            {{ current_project.name }}
        </h2>
        {% if current_project.description %}
        <p class="text-dark-muted text-sm mt-1 line-clamp-2">{{ current_project.description }}</p>
        {% endif %}
    </div>

    <!-- Project Navigation -->
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <!-- Details (first, default landing) -->
        <a href="{% url 'projects:detail' project_uuid=current_project.uuid %}"
           class="flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if not request.GET.tab or request.GET.tab == 'settings' %}bg-dark-border{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Details
        </a>

        <!-- Services -->
        <a href="{% url 'projects:detail' project_uuid=current_project.uuid %}?tab=services"
           class="flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if request.GET.tab == 'services' %}bg-dark-border{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Services
        </a>

        <!-- Environments -->
        <a href="{% url 'projects:detail' project_uuid=current_project.uuid %}?tab=environments"
           class="flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if request.GET.tab == 'environments' %}bg-dark-border{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
            </svg>
            Environments
        </a>

        <!-- Members -->
        <a href="{% url 'projects:detail' project_uuid=current_project.uuid %}?tab=members"
           class="flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if request.GET.tab == 'members' %}bg-dark-border{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            Members
        </a>
    </nav>

    <!-- User Section (same as main nav) -->
    <div class="p-4 border-t border-dark-border">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full bg-dark-accent flex items-center justify-center text-white font-medium">
                    {{ user.username|slice:":1"|upper }}
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-dark-text">{{ user.username }}</p>
                    <p class="text-xs text-dark-muted">{{ user.email }}</p>
                </div>
            </div>
            <a href="{% url 'auth:logout' %}" class="text-dark-muted hover:text-dark-text transition-colors" title="Logout">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </a>
        </div>
    </div>
</aside>
