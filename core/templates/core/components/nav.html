<!-- Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-full w-64 bg-dark-surface border-r border-dark-border flex flex-col">
    <!-- Logo / Home -->
    <div class="p-4 border-b border-dark-border">
        <a href="{% url 'dashboard:home' %}" class="text-xl font-bold text-dark-text hover:text-dark-accent transition-colors">
            DevSSP
        </a>
    </div>

    <!-- Main Navigation -->
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto" x-data="{
        serviceCatalogOpen: $persist(true).as('nav_serviceCatalog'),
        ciWorkflowsOpen: $persist(false).as('nav_ciWorkflows'),
        integrationsOpen: $persist({% if 'connections' in request.path or 'plugins' in request.path %}true{% else %}false{% endif %}).as('nav_integrations'),
        settingsOpen: $persist({% if 'settings' in request.path %}true{% else %}false{% endif %}).as('nav_settings')
    }">
        <!-- Service Catalog (all authenticated users) -->
        <div>
            <!-- Parent toggle -->
            <button @click="serviceCatalogOpen = !serviceCatalogOpen"
                    class="w-full flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if 'services' in request.path or 'projects' in request.path %}bg-dark-border{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                </svg>
                Service Catalog
                <svg class="w-4 h-4 ml-auto transition-transform" :class="{ 'rotate-90': serviceCatalogOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <!-- Sub-items -->
            <div x-show="serviceCatalogOpen" x-transition x-cloak class="ml-2 mt-1 space-y-1">
                <a href="{% url 'services:list' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if request.path == '/services/' %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Services
                </a>
                <a href="{% url 'projects:list' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if 'projects' in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Projects
                </a>
            </div>
        </div>

        <!-- CI Workflows (all authenticated users) -->
        <div>
            <!-- Parent toggle -->
            <button @click="ciWorkflowsOpen = !ciWorkflowsOpen"
                    class="w-full flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if 'ci-workflows' in request.path %}bg-dark-border{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                CI Workflows
                <svg class="w-4 h-4 ml-auto transition-transform" :class="{ 'rotate-90': ciWorkflowsOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <!-- Sub-items -->
            <div x-show="ciWorkflowsOpen" x-transition x-cloak class="ml-2 mt-1 space-y-1">
                <a href="#" {# TODO Plan 03: ci_workflows:workflow_list #}
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if 'ci-workflows' in request.path and 'steps' not in request.path and 'runtimes' not in request.path and 'repos' not in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Workflows
                </a>
                <a href="{% url 'ci_workflows:steps_catalog' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if '/ci-workflows/steps' in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Steps
                </a>
                <a href="{% url 'ci_workflows:runtimes' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if '/ci-workflows/runtimes' in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Runtimes
                </a>
                <a href="{% url 'ci_workflows:repo_list' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if '/ci-workflows/repos' in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Repositories
                </a>
            </div>
        </div>

        <!-- Resources (standalone) -->
        <div>
            <a href="{% url 'resources:list' %}"
               class="flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if request.path == '/resources/' %}bg-dark-border{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                Resources
            </a>
        </div>

        <!-- Integrations (all authenticated users) -->
        <div>
            <!-- Parent toggle -->
            <button @click="integrationsOpen = !integrationsOpen"
                    class="w-full flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if 'connections' in request.path %}bg-dark-border{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                </svg>
                Integrations
                <svg class="w-4 h-4 ml-auto transition-transform" :class="{ 'rotate-90': integrationsOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <!-- Sub-items -->
            <div x-show="integrationsOpen" x-transition x-cloak class="ml-2 mt-1 space-y-1">
                <a href="{% url 'connections:list' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if 'connections' in request.path and 'plugins' not in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Connections
                </a>
                <a href="{% url 'connections:plugins' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if 'plugins' in request.path %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Plugins
                </a>
            </div>
        </div>

        <!-- Settings (admin only) -->
        {% if is_admin %}
        <div class="mt-6 pt-6 border-t border-dark-border">
            <!-- Parent toggle -->
            <button @click="settingsOpen = !settingsOpen"
                    class="w-full flex items-center px-3 py-2 rounded-lg text-dark-text hover:bg-dark-border/50 transition-colors {% if 'settings' in request.path %}bg-dark-border{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Settings
                <svg class="w-4 h-4 ml-auto transition-transform" :class="{ 'rotate-90': settingsOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <!-- Sub-items -->
            <div x-show="settingsOpen" x-transition x-cloak class="ml-2 mt-1 space-y-1">
                <a href="{% url 'settings:general' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if active_settings_section == 'general' %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    General
                </a>
                <a href="{% url 'settings:user_management' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if active_settings_section == 'user_management' %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Users & Groups
                </a>
                <a href="{% url 'settings:audit_logs' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if active_settings_section == 'audit_logs' %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Audit Log
                </a>
                <a href="{% url 'settings:notifications' %}"
                   class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm transition-colors {% if active_settings_section == 'notifications' %}bg-dark-border/50 text-dark-text{% else %}text-dark-muted hover:bg-dark-border/50 hover:text-dark-text{% endif %}">
                    Notifications
                </a>
            </div>
        </div>
        {% endif %}
    </nav>

    <!-- User Section -->
    <div class="p-4 border-t border-dark-border">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full bg-dark-accent flex items-center justify-center text-white font-medium">
                    {{ user.username|slice:":1"|upper }}
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-dark-text">{{ user.username }}</p>
                    <p class="text-xs text-dark-muted">{{ user.email }}</p>
                </div>
            </div>
            <a href="{% url 'auth:logout' %}" class="text-dark-muted hover:text-dark-text transition-colors" title="Logout">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </a>
        </div>
    </div>
</aside>
