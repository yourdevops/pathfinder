# ssp-template.yaml
# DevSSP Blueprint Manifest

# Required fields
name: python-helloworld
description: Simple Python Flask app with multi-target deployment. Includes deployment manifests for Docker, Podman, and Kubernetes.

# Source configuration
source:
  include:
    - src/
    - Containerfile
    - deploy/
    - .github/
  exclude:
    - README.md
    - "*.md"

# CI Configuration
ci:
  type: github-actions
  config_file: .github/workflows/build.yml

# Deployment Configuration
deploy:
  type: container
  mechanism: direct
  required_plugins:
    - docker

# Metadata
tags:
  - python
  - flask
  - container
  - docker
  - kubernetes

# Variable Schema
variables:
  - name: service_port
    description: External port for the service
    type: number
    default: 8080
  - name: replicas
    description: Number of replicas for Kubernetes deployment
    type: number
    default: 1

# Default Service Configuration
defaults:
  port: 8080
  health_endpoint: /health
